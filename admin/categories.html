<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — GameVault Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">🎮</div>
      <span class="sidebar-logo-text">GAMEVAULT</span>
      <span class="sidebar-badge">ADMIN</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html" class="sidebar-item"><span class="sidebar-item-icon">📊</span> Dashboard</a>
      <a href="games.html" class="sidebar-item"><span class="sidebar-item-icon">🎮</span> Games</a>
      <a href="categories.html" class="sidebar-item active"><span class="sidebar-item-icon">🏷️</span> Categories</a>
      <div class="sidebar-section-label" style="margin-top:.5rem">Analytics</div>
      <a href="analytics.html" class="sidebar-item"><span class="sidebar-item-icon">📈</span> Analytics</a>
      <div class="sidebar-section-label" style="margin-top:.5rem">System</div>
      <a href="settings.html" class="sidebar-item"><span class="sidebar-item-icon">⚙️</span> Settings</a>
      <a href="../index.html" class="sidebar-item" target="_blank"><span class="sidebar-item-icon">🌐</span> View Site</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">👑</div>
        <div><div class="sidebar-user-name" id="admin-name">Admin</div><div class="sidebar-user-role">Administrator</div></div>
        <button class="logout-btn" onclick="logout()">⏻</button>
      </div>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <div>
        <div class="admin-header-title">Categories</div>
        <div class="header-breadcrumb">Admin <span>›</span> Categories</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openCatForm()">+ Add Category</button>
      </div>
    </header>
    <div class="admin-content">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem" id="cats-grid"></div>
    </div>
  </main>
</div>

<!-- Category Modal -->
<div id="cat-modal" class="admin-modal-overlay" style="display:none">
  <div class="admin-modal" style="max-width:440px">
    <div class="admin-modal-header">
      <span class="admin-modal-title" id="cat-modal-title">Add Category</span>
      <button class="admin-modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div class="admin-modal-body">
      <input type="hidden" id="cat-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" class="form-input" id="cat-name" placeholder="e.g. RPG">
        </div>
        <div class="form-group">
          <label class="form-label">Icon (emoji) *</label>
          <input type="text" class="form-input" id="cat-icon" placeholder="🧙">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">Color</label>
          <input type="color" class="form-input" id="cat-color" value="#6c63ff" style="height:44px;padding:.3rem .5rem;cursor:pointer">
        </div>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn btn-secondary" onclick="closeCatModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCat()">💾 Save</button>
    </div>
  </div>
</div>

<div id="toast-container" class="admin-toast"></div>
<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
if (!GameDB.isAdmin()) { window.location.href = 'index.html'; }
const user = GameDB.getSession();
if (user) document.getElementById('admin-name').textContent = user.username;

function renderCats() {
  const cats = GameDB.getCategories();
  const games = GameDB.getGames();
  const grid = document.getElementById('cats-grid');
  grid.innerHTML = '';

  cats.forEach(c => {
    const count = games.filter(g => g.category === c.name).length;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="height:6px;background:${c.color};border-radius:var(--radius-lg) var(--radius-lg) 0 0"></div>
      <div class="card-body" style="display:flex;align-items:center;gap:1rem">
        <div style="width:56px;height:56px;border-radius:12px;background:${c.color}22;border:2px solid ${c.color}44;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0">${c.icon}</div>
        <div style="flex:1">
          <div style="font-family:var(--font-ui);font-weight:700;font-size:1rem">${c.name}</div>
          <div style="color:var(--text-muted);font-size:.8rem;margin-top:.2rem">${count} game${count!==1?'s':''}</div>
        </div>
        <div style="display:flex;gap:.4rem">
          <button class="action-btn" onclick='editCat(${c.id})' title="Edit">✏️</button>
          <button class="action-btn danger" onclick="deleteCat(${c.id},'${c.name}')" title="Delete">🗑️</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  // Add placeholder
  const addCard = document.createElement('div');
  addCard.style.cssText = 'background:rgba(255,136,0,0.04);border:2px dashed rgba(255,136,0,0.2);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;min-height:106px;cursor:pointer;transition:var(--transition)';
  addCard.innerHTML = `<div style="text-align:center;color:var(--text-muted)"><div style="font-size:1.5rem;margin-bottom:.3rem">+</div><div style="font-size:.85rem;font-family:var(--font-ui)">Add Category</div></div>`;
  addCard.addEventListener('mouseenter', () => addCard.style.borderColor='var(--primary)');
  addCard.addEventListener('mouseleave', () => addCard.style.borderColor='rgba(255,136,0,0.2)');
  addCard.addEventListener('click', () => openCatForm());
  grid.appendChild(addCard);
}

function openCatForm() {
  document.getElementById('cat-modal-title').textContent = '➕ Add Category';
  document.getElementById('cat-id').value = '';
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-icon').value = '';
  document.getElementById('cat-color').value = '#6c63ff';
  document.getElementById('cat-modal').style.display = 'flex';
}

function editCat(id) {
  const cats = GameDB.getCategories();
  const c = cats.find(c => c.id === id);
  if (!c) return;
  document.getElementById('cat-modal-title').textContent = '✏️ Edit Category';
  document.getElementById('cat-id').value = c.id;
  document.getElementById('cat-name').value = c.name;
  document.getElementById('cat-icon').value = c.icon;
  document.getElementById('cat-color').value = c.color || '#6c63ff';
  document.getElementById('cat-modal').style.display = 'flex';
}

function closeCatModal() { document.getElementById('cat-modal').style.display = 'none'; }

function saveCat() {
  const id = document.getElementById('cat-id').value;
  const name = document.getElementById('cat-name').value.trim();
  const icon = document.getElementById('cat-icon').value.trim();
  if (!name || !icon) { AdminToast.show('Name and icon are required', 'error'); return; }
  GameDB.saveCategory({ ...(id?{id:parseInt(id)}:{}), name, icon, color: document.getElementById('cat-color').value });
  closeCatModal();
  renderCats();
  AdminToast.show(id ? 'Category updated!' : 'Category added!', 'success');
}

function deleteCat(id, name) {
  AdminHelper.confirmDeleteCat(id, name, () => {
    GameDB.deleteCategory(id);
    renderCats();
    AdminToast.show('Category deleted', 'success');
  });
}

function logout() { GameDB.logout(); window.location.href = 'index.html'; }

renderCats();
</script>
</body>
</html>
